<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <button id="stop">Stop</button>

<script>
    // setTimeout function basically excecutes after some time but only once
    // it just opposite for setInterval exceutes continusly after some time you have given
    setTimeout(function(){
        console.log("Sonu");
        
    }, 2000) // delay for 2 sec and then exceutes

    // can give reference also
    const sayHello = function() {
        console.log("Hello");
        
    }

    setTimeout(sayHello, 2000)
</script>
</body>
</html>
